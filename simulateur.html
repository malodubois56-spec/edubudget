<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduBudget — Simulateur Budget Grandes Écoles de Commerce</title>
<meta name="description" content="Simulez le budget réel de votre école de commerce. 57 écoles, APL, CROUS, alternance. Gratuit.">
<link rel="canonical" href="https://edubudget.app/simulateur.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#4f46e5;--p2:#6366f1;--pl:#eef2ff;--pm:#c7d2fe;
  --cy:#06b6d4;--cyl:#ecfeff;--cym:#a5f3fc;
  --gn:#16a34a;--gnl:#f0fdf4;--gnm:#bbf7d0;
  --am:#d97706;--aml:#fffbeb;--amm:#fde68a;
  --rd:#dc2626;--rdl:#fef2f2;
  --bg:#f8faff;--bg1:#f1f5f9;--bg2:#e2e8f0;
  --card:#fff;--border:#e2e8f0;
  --txt:#0f172a;--txt2:#475569;--txt3:#94a3b8;
  --sh:0 1px 3px rgba(0,0,0,.07);--sh-md:0 4px 14px rgba(0,0,0,.09);
  --r:10px;--rl:16px;--rxl:20px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --nav-h:62px;
}
body.dark{
  --bg:#0f172a;--bg1:#1e293b;--bg2:#334155;
  --card:#1a2744;--border:#334155;
  --txt:#f1f5f9;--txt2:#94a3b8;--txt3:#64748b;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--txt);line-height:1.6;transition:background .2s,color .2s;min-height:100vh}

/* ── NAV PERSISTANTE ───────────────────── */
.topnav{
  position:sticky;top:0;z-index:100;
  background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 1.5rem;height:var(--nav-h);
  gap:1rem;
  box-shadow:var(--sh);
  transition:background .2s,border-color .2s;
}
.tn-logo{
  font-size:.97rem;font-weight:800;color:var(--p);
  letter-spacing:-.02em;display:flex;align-items:center;gap:6px;
  cursor:pointer;text-decoration:none;flex-shrink:0;
}
.tn-dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--cy),var(--p))}
.tn-back{
  display:flex;align-items:center;gap:5px;
  font-size:.82rem;font-weight:600;color:var(--txt3);
  cursor:pointer;text-decoration:none;
  padding:5px 12px;border-radius:50px;border:1.5px solid var(--border);
  background:var(--bg1);transition:all .15s;
  flex-shrink:0;
}
.tn-back:hover{color:var(--txt);border-color:var(--pm);background:var(--pl)}
.tn-tabs{
  display:flex;align-items:center;gap:3px;
  flex:1;justify-content:center;
  background:var(--bg1);border-radius:50px;
  padding:4px;max-width:480px;
}
.tn-tab{
  flex:1;padding:7px 12px;
  border:none;border-radius:50px;
  font-size:.8rem;font-weight:700;
  cursor:pointer;background:transparent;
  color:var(--txt3);
  transition:all .18s;font-family:var(--font);
  white-space:nowrap;
}
.tn-tab.act{background:var(--card);color:var(--p);box-shadow:var(--sh)}
.tn-tab:hover:not(.act){color:var(--txt2)}
.tn-r{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.dm-btn{
  width:34px;height:34px;border-radius:50%;
  border:1.5px solid var(--border);background:var(--bg1);
  color:var(--txt2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;transition:all .15s;
}
.dm-btn:hover{background:var(--bg2);color:var(--txt)}
@media(max-width:640px){
  .tn-tab{font-size:.7rem;padding:6px 8px}
  .tn-back span{display:none}
}

/* ── PAGES CONTAINER ─────────────────── */
/* Chaque page = display:none / display:block */
.page{display:none;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── WIZARD ─────────────────────────── */
.w-outer{
  display:flex;align-items:flex-start;justify-content:center;
  min-height:calc(100vh - var(--nav-h));
  padding:2rem 1rem 3rem;
}
.w-wrap{width:100%;max-width:620px}
.w-progress{
  display:flex;align-items:center;gap:.5rem;
  margin-bottom:1.5rem;
}
.wp-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--bg2);transition:all .3s;flex-shrink:0;
}
.wp-dot.done{background:var(--p)}
.wp-dot.cur{width:24px;border-radius:4px;background:linear-gradient(90deg,var(--p),var(--cy))}
.wp-lbl{font-size:.78rem;font-weight:600;color:var(--txt3);margin-left:auto}
.sc{
  background:var(--card);border-radius:var(--rxl);
  padding:1.875rem;border:1px solid var(--border);
  box-shadow:var(--sh);
  transition:background .2s,border-color .2s;
}
.ebrow{display:flex;align-items:center;gap:8px;margin-bottom:.45rem}
.sbadge{
  background:linear-gradient(135deg,var(--p),var(--cy));
  color:#fff;font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:50px;letter-spacing:.04em;text-transform:uppercase;
}
.stit{font-size:1.18rem;font-weight:800;color:var(--txt);margin-bottom:.3rem;letter-spacing:-.02em}
.ssub{font-size:.82rem;color:var(--txt2);margin-bottom:1.4rem;line-height:1.65}
.og{display:grid;gap:9px}
.og2{grid-template-columns:1fr 1fr}
.og3{grid-template-columns:1fr}
@media(min-width:460px){.og3{grid-template-columns:repeat(3,1fr)}}
.oc{
  border:2px solid var(--border);border-radius:var(--rl);
  padding:1.1rem .875rem;text-align:center;
  cursor:pointer;transition:all .18s;background:var(--card);
  position:relative;overflow:hidden;
}
.oc:hover{border-color:var(--pm);transform:translateY(-1px);box-shadow:var(--sh-md)}
.oc.sel{border-color:var(--p);background:var(--pl);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.oc.sel-g{border-color:var(--gn);background:var(--gnl);box-shadow:0 0 0 3px rgba(22,163,74,.08)}
.oc-chk{
  position:absolute;top:8px;right:8px;
  width:18px;height:18px;border-radius:50%;
  background:var(--p);display:none;align-items:center;justify-content:center;font-size:9px;color:#fff;
}
.oc.sel .oc-chk{display:flex}
.oc.sel-g .oc-chk{display:flex;background:var(--gn)}
.oc-i{font-size:1.7rem;margin-bottom:.5rem;display:block;transition:transform .18s}
.oc:hover .oc-i{transform:scale(1.07)}
.oc-n{font-weight:700;font-size:.86rem;color:var(--txt)}
.oc-d{font-size:.73rem;color:var(--txt2);margin-top:3px;line-height:1.5}
.oc-p{font-size:.76rem;font-weight:700;color:var(--p);margin-top:5px}
.oc-p-g{color:var(--gn)}
.sw{position:relative}
.ssel{
  width:100%;padding:11px 36px 11px 13px;
  border:2px solid var(--border);border-radius:var(--rl);
  font-size:.9rem;color:var(--txt);background:var(--card);
  cursor:pointer;appearance:none;font-family:var(--font);
  font-weight:500;transition:border-color .18s;
}
.ssel:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.sarr{position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--txt3);font-size:.78rem}
.sinf{
  background:linear-gradient(135deg,var(--pl),var(--cyl));
  border:1px solid var(--pm);border-radius:var(--rl);
  padding:.95rem;margin-top:.75rem;
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
}
.si-l{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);font-weight:700;margin-bottom:2px}
.si-v{font-size:.95rem;font-weight:800;color:var(--p);letter-spacing:-.02em}
.rng{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--bg2);outline:none}
.rng::-webkit-slider-thumb{-webkit-appearance:none;width:21px;height:21px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--cy));cursor:pointer;box-shadow:0 2px 8px rgba(79,70,229,.35)}
.dv{text-align:center;font-size:2.6rem;font-weight:800;color:var(--p);line-height:1;margin:.6rem 0;letter-spacing:-.04em}
.dbs{display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.db{
  padding:6px 15px;border:2px solid var(--border);border-radius:50px;
  background:var(--card);font-size:.82rem;font-weight:700;cursor:pointer;
  color:var(--txt2);transition:all .18s;font-family:var(--font);
}
.db:hover:not(:disabled){border-color:var(--p);color:var(--p)}
.db.act{border-color:var(--p);background:var(--p);color:#fff}
.db:disabled{opacity:.25;cursor:not-allowed}
.ntc{border-radius:var(--rl);padding:.8rem .95rem;font-size:.8rem;margin-top:.75rem;display:flex;align-items:flex-start;gap:8px;font-weight:500;line-height:1.55}
.nb{background:var(--pl);border:1px solid var(--pm);color:var(--p)}
.no{background:var(--aml);border:1px solid var(--amm);color:#92400e}
.ng{background:var(--gnl);border:1px solid var(--gnm);color:#166534}
.apl-b{margin-top:.75rem;background:var(--gnl);border:1.5px solid var(--gnm);border-radius:var(--rl);padding:.8rem .95rem;display:flex;align-items:flex-start;gap:9px}
.trow{display:flex;align-items:center;gap:9px;cursor:pointer;font-weight:700;font-size:.84rem;color:#166534}
.tog{width:40px;height:22px;background:var(--bg2);border-radius:11px;position:relative;cursor:pointer;transition:background .18s;flex-shrink:0}
.tog.on{background:var(--gn)}
.togk{position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .18s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tog.on .togk{left:21px}
.tier{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:2px 9px;border-radius:50px}
.t1{background:#fef3c7;color:#78350f}.t2{background:var(--pl);color:#3730a3}.t3{background:var(--gnl);color:#14532d}
.nav-btns{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1.1rem;border-top:1px solid var(--border)}
.bbk{padding:9px 20px;border:2px solid var(--border);border-radius:50px;background:var(--card);font-size:.84rem;font-weight:700;cursor:pointer;color:var(--txt2);transition:all .18s;font-family:var(--font)}
.bbk:hover{border-color:var(--bg2);background:var(--bg1)}
.bnx{padding:11px 26px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;border-radius:50px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;font-family:var(--font);box-shadow:0 4px 14px rgba(79,70,229,.3)}
.bnx:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,70,229,.4)}
.bnx:disabled{background:var(--bg2);box-shadow:none;cursor:not-allowed;transform:none;color:var(--txt3)}
.ls-s{margin-bottom:1.1rem}
.ls-l{font-weight:700;font-size:.82rem;color:var(--txt2);margin-bottom:.5rem;display:flex;align-items:center;justify-content:space-between;gap:7px}
.ls-prev{background:linear-gradient(135deg,var(--pl),var(--cyl));border:1.5px solid var(--pm);border-radius:var(--rl);padding:.95rem 1.1rem;margin-top:.75rem;text-align:center}
.num-i{padding:8px 11px;border:2px solid var(--border);border-radius:var(--r);font-size:.9rem;font-weight:700;color:var(--txt);background:var(--card);font-family:var(--font);transition:border-color .18s;width:100%}
.num-i:focus{outline:none;border-color:var(--p)}
.inline-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sect-lbl{font-size:.8rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.6rem}

/* ── RESULTS ──────────────────────────── */
.r-outer{
  min-height:calc(100vh - var(--nav-h));
  padding:2rem 1rem 4rem;
}
.rw{max-width:900px;margin:0 auto}
.r-hero{text-align:center;margin-bottom:1.75rem}
.rstag{display:inline-flex;align-items:center;gap:6px;background:var(--pl);border:1px solid var(--pm);border-radius:50px;padding:4px 13px;font-size:.76rem;font-weight:700;color:var(--p);margin-bottom:.6rem}
.rtit{font-size:1.8rem;font-weight:800;color:var(--txt);letter-spacing:-.035em;margin-bottom:.25rem}
.rsub{font-size:.8rem;color:var(--txt3)}
.kpis{display:grid;grid-template-columns:1fr;gap:.875rem;margin-bottom:1.1rem}
@media(min-width:500px){.kpis{grid-template-columns:repeat(3,1fr)}}
.kpi{border-radius:var(--rxl);padding:1.35rem;position:relative;overflow:hidden}
.km{background:linear-gradient(135deg,var(--p),#7c3aed);color:#fff}
.ks{background:linear-gradient(135deg,#0891b2,var(--cy));color:#fff}
.ka{background:var(--gnl);border:1.5px solid var(--gnm)}
.kl{font-size:.7rem;font-weight:700;opacity:.8;margin-bottom:.4rem;letter-spacing:.04em;text-transform:uppercase}
.kv{font-size:1.65rem;font-weight:800;letter-spacing:-.04em;line-height:1}
.km .kv,.ks .kv{color:#fff}.ka .kv{color:var(--gn)}
.ksub{font-size:.7rem;margin-top:.35rem;opacity:.7}
.km .ksub,.ks .ksub{color:#fff}.ka .ksub{color:var(--gn)}
.tabs{display:flex;gap:3px;background:var(--bg1);border-radius:50px;padding:3px;margin-bottom:1.1rem;overflow-x:auto}
.tab{flex:1;padding:7px 13px;border:none;border-radius:50px;font-size:.77rem;font-weight:700;cursor:pointer;background:transparent;color:var(--txt3);transition:all .18s;font-family:var(--font);white-space:nowrap}
.tab.act{background:var(--card);color:var(--p);box-shadow:var(--sh)}
.tpane{display:none}.tpane.act{display:block}
.rg{display:grid;grid-template-columns:1fr;gap:.875rem;margin-bottom:.875rem}
@media(min-width:560px){.rg{grid-template-columns:1fr 1fr}}
.rc{background:var(--card);border-radius:var(--rxl);padding:1.3rem;border:1px solid var(--border);box-shadow:var(--sh);transition:background .2s}
.rch{display:flex;align-items:center;gap:8px;margin-bottom:.8rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.rci{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.ri-p{background:var(--pl)}.ri-c{background:var(--cyl)}.ri-g{background:var(--gnl)}
.rct{font-weight:700;font-size:.88rem;color:var(--txt)}
.rcs{font-size:.72rem;color:var(--txt3);margin-top:1px}
.rl{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.rl:last-child{border-bottom:none}
.rll{color:var(--txt2)}.rlv{font-weight:700;color:var(--txt)}
.rlv.g{color:var(--gn)}.rlv.p{color:var(--p)}.rlv.r{color:var(--rd)}
.rl.tot{border-top:2px solid var(--border);padding-top:8px;margin-top:4px;border-bottom:none}
.rl.tot .rll{color:var(--txt);font-weight:700;font-size:.86rem}
.rl.tot .rlv{font-size:1rem}
.mt{display:flex;background:var(--bg1);border-radius:50px;padding:3px;width:fit-content;margin-bottom:.75rem}
.mb{padding:5px 12px;border:none;border-radius:50px;font-size:.75rem;font-weight:700;cursor:pointer;background:transparent;color:var(--txt3);transition:all .18s;font-family:var(--font)}
.mb.act{background:var(--card);color:var(--p);box-shadow:var(--sh)}
.cc{background:var(--card);border-radius:var(--rxl);padding:1.3rem;border:1px solid var(--border);box-shadow:var(--sh);margin-bottom:.875rem;transition:background .2s}
.cch{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem;flex-wrap:wrap;gap:7px}
.cct{font-weight:700;font-size:.88rem;color:var(--txt)}
.leg{display:flex;gap:10px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:.73rem;color:var(--txt3);font-weight:500}
.ld{width:8px;height:8px;border-radius:2px}
.bbar{height:7px;background:var(--bg1);border-radius:4px;overflow:hidden;margin:4px 0 8px;display:flex}
.bs{height:100%}.bs-t{background:var(--p)}.bs-h{background:var(--am)}.bs-l{background:var(--cy)}
.yp{display:inline-flex;align-items:center;gap:2px;background:var(--pl);color:var(--p);font-size:11px;font-weight:700;padding:2px 8px;border-radius:50px;border:1px solid var(--pm)}
.yp.alt{background:var(--gnl);color:var(--gn);border-color:var(--gnm)}
.sbanner{background:linear-gradient(135deg,var(--gnl),#dcfce7);border:1.5px solid var(--gnm);border-radius:var(--rxl);padding:1.2rem;margin-bottom:.875rem;display:flex;align-items:center;gap:.875rem}
.sbico{width:42px;height:42px;background:var(--gn);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.sbv{font-size:1.55rem;font-weight:800;color:var(--gn);letter-spacing:-.04em;line-height:1;margin-bottom:2px}
.sbl{font-size:.7rem;font-weight:700;color:var(--gn);text-transform:uppercase;letter-spacing:.05em}
.sbs{font-size:.75rem;color:#166534}
.savc{background:var(--card);border-radius:var(--rxl);padding:1.3rem;border:1px solid var(--border);box-shadow:var(--sh);transition:background .2s}
.savr{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-radius:var(--rl);padding:1.2rem;text-align:center;margin-top:.875rem}
.savr-v{font-size:2.1rem;font-weight:800;letter-spacing:-.04em;line-height:1}
.savr-s{font-size:.77rem;opacity:.75;margin-top:.3rem}
.crous-r{background:var(--gnl);border:1.5px solid var(--gnm);border-radius:var(--rl);padding:1.1rem;text-align:center;margin-top:.875rem}
.crous-v{font-size:1.75rem;font-weight:800;color:var(--gn);letter-spacing:-.04em}
.crous-none{background:var(--rdl);border:1px solid #fca5a5;border-radius:var(--rl);padding:.875rem;text-align:center;color:var(--rd);font-weight:600;font-size:.85rem}
.share-row{display:flex;gap:8px;align-items:center;margin-top:.875rem}
.share-i{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--rl);font-size:.8rem;background:var(--bg1);color:var(--txt);font-family:var(--font)}
.share-b{padding:9px 16px;border-radius:var(--rl);border:none;background:var(--p);color:#fff;font-size:.8rem;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all .18s}
.share-b:hover{background:var(--p2)}
.racts{display:flex;gap:8px;flex-wrap:wrap;margin:1rem 0}
.ract{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);color:var(--txt2);font-size:.8rem;font-weight:700;cursor:pointer;transition:all .18s;font-family:var(--font)}
.ract:hover{border-color:var(--pm);color:var(--p);background:var(--pl)}
.restrt{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:11px;background:var(--card);border:2px solid var(--border);border-radius:var(--rl);font-size:.88rem;font-weight:700;color:var(--txt2);cursor:pointer;transition:all .2s;margin-top:.875rem;font-family:var(--font)}
.restrt:hover{border-color:var(--pm);color:var(--p);background:var(--pl)}

/* ── PAGES SECONDAIRES (compare/ranking/finder) ── */
.p-outer{min-height:calc(100vh - var(--nav-h));padding:2rem 1rem 4rem}
.pw{max-width:940px;margin:0 auto}
.pt{font-size:1.35rem;font-weight:800;color:var(--txt);letter-spacing:-.03em;margin-bottom:.35rem}
.ps{font-size:.84rem;color:var(--txt2);margin-bottom:1.5rem}

/* COMPARE */
.cmp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:1.25rem}
.cmp-slot{background:var(--card);border:2px dashed var(--border);border-radius:var(--rl);padding:1.2rem;text-align:center;min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.35rem;transition:all .2s}
.cmp-slot.filled{border-style:solid;border-color:var(--pm);background:var(--pl)}
.cmp-sn{font-size:.68rem;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em}
.cmp-name{font-size:.9rem;font-weight:700;color:var(--p)}
.cmp-city{font-size:.74rem;color:var(--txt2)}
.cmp-price{font-size:.8rem;font-weight:700;color:var(--gn);margin-top:2px}
.cmp-rm{font-size:.72rem;color:var(--rd);cursor:pointer;font-weight:600;margin-top:3px}

const f=n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(Math.round(n));
const chk='<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function calcLv(){
  const td=TIERS[getTier(S.school.city)];
  const rent=S.housing==='coloc'?Math.round(td.rent*.8):S.housing==='studio'?td.rent:0;
  const apl=(S.apl&&S.housing!=='parents')?Math.min(Math.round(rent*.35),280):0;
  const netRent=rent-apl;
  const tc=S.transport==='tc'?td.tc:S.transport==='voiture'?td.tc+100:0;
  return{rent,apl,netRent,food:S.food,tc,leisure:S.leisure,misc:S.misc,monthly:Math.round(netRent+S.food+tc+S.leisure+S.misc)};
}
function calcAll(){
  const lv=calcLv();const dur=S.duration;
  const altYrs=S.alternance?(S.cursus==='bachelor'?1:2):0;
  let tT=0,tH=0,tL=0,tA=0;const yrs=[];
  for(let y=1;y<=dur;y++){
    const isA=S.alternance&&y>(dur-altYrs);
    const tuition=isA?0:S.school.fees;
    const housing=lv.netRent*S.months;
    const living=(lv.food+lv.tc+lv.leisure+lv.misc)*S.months;
    const inc=isA?1100*12:0;
    tT+=tuition;tH+=housing;tL+=living;tA+=inc;
    yrs.push({y,isA,tuition,housing,living,inc,net:tuition+housing+living-inc});
  }
  const gross=tT+tH+tL;
  return{lv,yrs,tT,tH,tL,tA,gross,net:gross-tA,altYrs,aplTotal:lv.apl*S.months*dur};
}
function calcSchoolBudget(school){
  const td=TIERS[getTier(school.city)];
  const monthly=td.rent+250+td.tc+100+50;
  return{monthly,annual:Math.round(school.fees+monthly*10),tuition:school.fees,living:Math.round(monthly*10)};
}
function calcCROUS(rfr,parts){
  const pp=rfr/parts;
  if(pp>33000)return{echelon:null,monthly:0};
  const E=[{e:'0bis',m:107,l:33000},{e:1,m:170,l:26000},{e:2,m:270,l:20000},{e:3,m:370,l:15000},{e:4,m:440,l:11000},{e:5,m:510,l:8000},{e:6,m:555,l:5000},{e:7,m:600,l:0}];
  for(const e of E){if(pp>e.l)return{echelon:e.e,monthly:e.m};}
  return{echelon:7,monthly:600};
}
function calcSavings(total,years){
  if(years<=0)return total;
  const r=0.02/12,n=years*12;
  return Math.round(total*r/(Math.pow(1+r,n)-1));
}

  const raw=localStorage.getItem('eb-state');if(!raw)return false;
  try{
    const d=JSON.parse(raw);if(!d.cursus||d.si<0)return false;
    S.cursus=d.cursus;S.school=SCHOOLS[d.cursus][d.si];
    S.duration=d.duration;S.alternance=d.alternance;S.housing=d.housing;
    S.apl=d.apl;S.food=d.food;S.transport=d.transport;S.leisure=d.leisure;S.misc=d.misc;S.months=d.months;
    return true;
  }catch(e){return false;}
}
function getShareLink(){
  if(!S.school)return window.location.href;
  const p=new URLSearchParams({c:S.cursus,si:SCHOOLS[S.cursus].indexOf(S.school),d:S.duration,a:S.alternance?1:0,h:S.housing||'',apl:S.apl?1:0,fn:S.food,t:S.transport,l:S.leisure,m:S.misc,mo:S.months});
  return window.location.origin+window.location.pathname+'?'+p.toString();
}
function copyLink(){

    const btn=document.getElementById('share-copy-btn');
    if(btn){btn.textContent='✓ Copié !';setTimeout(()=>btn.textContent='Copier le lien',2000);}
  });
}
function loadFromURL(){
  const p=new URLSearchParams(window.location.search);
  if(!p.get('c'))return false;
  try{
    S.cursus=p.get('c');S.school=SCHOOLS[S.cursus][parseInt(p.get('si'))];
    S.duration=parseInt(p.get('d'));S.alternance=p.get('a')==='1';S.housing=p.get('h');
    S.apl=p.get('apl')==='1';S.food=parseInt(p.get('fn'));S.transport=p.get('t');
    S.leisure=parseInt(p.get('l'));S.misc=parseInt(p.get('m'));S.months=parseInt(p.get('mo'));
    return true;
  }catch(e){return false;}
}

      <div class="rch"><div class="rci ${y.isA?'ri-g':'ri-p'}">${y.isA?'💼':'📅'}</div>
        <div><div class="rct">Année ${y.y}${y.isA?' · Alternance':''}</div></div></div>
      <div class="rl"><div class="rll">Scolarité</div><div class="rlv ${y.isA?'g':''}">${y.isA?'Gratuite':f(y.tuition)}</div></div>
      <div class="rl"><div class="rll">Logement</div><div class="rlv">${f(y.housing)}</div></div>
      <div class="rl"><div class="rll">Vie courante</div><div class="rlv">${f(y.living)}</div></div>
      ${y.isA?`<div class="rl"><div class="rll" style="color:var(--gn)">Revenus alt.</div><div class="rlv g">+${f(y.inc)}</div></div>`:''}
      <div class="rl tot"><div class="rll">Net an ${y.y}</div><div class="rlv p">${f(y.net)}</div></div>
    </div>`).join('')}
  </div>
</div>
<!-- TAB 3 -->
<div class="tpane" id="tp3">
  <div class="rc">
    <div class="rch"><div class="rci ri-g">🏛️</div><div><div class="rct">Simulateur Bourse CROUS</div></div></div>
    <div style="margin-bottom:1rem">
      <div class="sect-lbl" style="margin-bottom:.5rem">Revenu fiscal de référence (RFR) du foyer</div>
      <div class="inline-row">
        <input type="number" value="${crousRFR}" min="0" max="200000" step="1000" class="num-i" style="width:150px"
          onchange="crousRFR=parseInt(this.value)||0;renderResults()">
        <span style="font-size:.83rem;color:var(--txt3)">€ / an</span>
      </div>
    </div>
    <div>
      <div class="sect-lbl" style="margin-bottom:.5rem">Personnes dans le foyer fiscal</div>
      <div class="inline-row">${[1,2,3,4,5,6].map(n=>`<button class="db ${crousParts===n?'act':''}" onclick="crousParts=${n};renderResults()">${n}</button>`).join('')}</div>
    </div>
    ${crous.echelon!==null?`
      <div class="crous-r">
        <div style="font-size:.72rem;font-weight:700;color:var(--gn);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.35rem">Bourse estimée</div>
        <div class="crous-v">${f(crous.monthly)}<span style="font-size:.9rem;font-weight:500"> /mois</span></div>
        <div style="font-size:.78rem;color:#166534;margin-top:.35rem">Échelon ${crous.echelon} · <strong>${f(crousTotal)}</strong> sur le cursus</div>
      </div>
      <div class="ntc ng" style="margin-top:.75rem"><span class="ni">💡</span>Avec la bourse CROUS : budget net <strong>${f(R.net-crousTotal)}</strong></div>
    `:`<div class="crous-none" style="margin-top:.875rem">❌ D'après ces revenus, pas éligible à une bourse CROUS.</div>`}
    <div class="ntc nb" style="margin-top:.75rem"><span class="ni">ℹ️</span>Simulation indicative. Déposez votre DSE sur <strong>messervices.etudiant.gouv.fr</strong> avant le 31 mai.</div>
  </div>
</div>
<!-- TAB 4 -->
<div class="tpane" id="tp4">
  <div class="rc">
    <div class="rch"><div class="rci ri-c">🔗</div><div><div class="rct">Partager cette simulation</div></div></div>
    <p style="font-size:.83rem;color:var(--txt2);margin-bottom:.75rem">Copiez ce lien — la simulation sera reconstituée à l'ouverture.</p>
    <div class="share-row">
      <input class="share-i" id="share-url" value="${getShareLink()}" readonly onclick="this.select()">
      <button class="share-b" id="share-copy-btn" onclick="copyLink()">Copier le lien</button>
    </div>
    <div style="margin-top:1.25rem;padding-top:1.1rem;border-top:1px solid var(--border)">
      <div class="sect-lbl" style="margin-bottom:.6rem">Résumé</div>
      <div style="background:var(--bg1);border-radius:var(--rl);padding:1rem;font-size:.83rem;color:var(--txt2);line-height:1.75">
        🎓 <strong style="color:var(--txt)">${S.school.name}</strong><br>
        📍 ${S.school.city} · ${typeLabel} · ${S.duration} ans<br>
        💰 Budget net : <strong style="color:var(--p)">${f(R.net)}</strong><br>
        📅 Mensuel : <strong style="color:var(--p)">${f(R.lv.monthly)}/mois</strong><br>
        Simulation sur <strong>edubudget.app</strong>
      </div>
    </div>
  </div>
</div>
<div class="ntc nb no-print" style="margin-top:.875rem"><span class="ni">ℹ️</span>Estimations indicatives basées sur des moyennes.</div>
<button class="restrt no-print" onclick="goTo('wizard');startWizard()">↺ Nouvelle simulation</button>
`;
  // Charts
  setTimeout(()=>{
    const yc=document.getElementById('yrchart');
    if(yc){new Chart(yc,{type:'bar',data:{
      labels:R.yrs.map(y=>`An ${y.y}${y.isA?' (alt.)':''}`),
      datasets:[
        {label:'Scolarité',data:R.yrs.map(y=>y.tuition),backgroundColor:'rgba(79,70,229,.85)',stack:'c',borderRadius:4},
        {label:'Logement',data:R.yrs.map(y=>y.housing),backgroundColor:'rgba(217,119,6,.8)',stack:'c',borderRadius:4},
        {label:'Vie courante',data:R.yrs.map(y=>y.living),backgroundColor:'rgba(6,182,212,.8)',stack:'c',borderRadius:4},
        ...(R.tA>0?[{label:'Revenus',data:R.yrs.map(y=>y.inc>0?-y.inc:0),backgroundColor:'rgba(248,113,113,.75)',stack:'r',borderRadius:4}]:[]),
      ]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${f(Math.abs(c.parsed.y))}`}}},
      scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,ticks:{callback:v=>v<0?`-${Math.abs(v/1000)}k€`:`${v/1000}k€`},grid:{color:'rgba(0,0,0,.04)'}}}}})}
    const tc=document.getElementById('timeline-chart');
    if(tc){
      const months=[];const cumul=[];let cum=0;
      R.yrs.forEach(y=>{for(let m=1;m<=S.months;m++){cum+=Math.round((y.tuition/S.months)+y.housing/S.months+y.living/S.months-(y.inc/12));months.push(`An ${y.y} M${m}`);cumul.push(cum);}});
      new Chart(tc,{type:'line',data:{labels:months,datasets:[{label:'Budget cumulé',data:cumul,borderColor:'rgba(79,70,229,1)',backgroundColor:'rgba(79,70,229,.08)',fill:true,tension:.4,pointRadius:0,borderWidth:2}]},
      options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${f(c.parsed.y)}`}}},
      scales:{x:{grid:{display:false},ticks:{maxTicksLimit:S.duration+1,font:{size:10}}},y:{ticks:{callback:v=>`${v/1000}k€`},grid:{color:'rgba(0,0,0,.04)'}}}}})}
  },150);
}

function switchTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('act',i===n));
  document.querySelectorAll('.tpane').forEach((p,i)=>p.classList.toggle('act',i===n));
  if(n===1||n===2){setTimeout(()=>{const tab=n;renderResults();switchTab(tab);},10);}
}
function copyShareLink(){copyLink();const el=document.getElementById('share-notice');if(el){el.style.display='flex';setTimeout(()=>el.style.display='none',2500);}}

// ══════════════════════════════════════
// COMPARER
// ══════════════════════════════════════
const _allSchools=allSchools();
function renderCompare(){
  const metrics=[
    {l:'Scolarité / an',bfn:s=>s.fees,fn:s=>f(s.fees),best:'min'},
    {l:'Loyer studio / mois',bfn:s=>TIERS[getTier(s.city)].rent,fn:s=>f(TIERS[getTier(s.city)].rent),best:'min'},
    {l:'Budget estimé / an',bfn:s=>calcSchoolBudget(s).annual,fn:s=>f(calcSchoolBudget(s).annual),best:'min'},
    {l:'Ville',fn:s=>s.city,best:null},
    {l:'Accréditations / Programme',fn:s=>s.accred||s.program||'—',best:null},
  ];
  document.getElementById('vcontent').innerHTML=`
<div class="pt">⚖️ Comparateur d'écoles</div>
<div class="ps">Sélectionnez jusqu'à 3 écoles pour les comparer côte à côte.</div>
<div class="cmp-grid">
  ${[0,1,2].map(i=>{const s=cmpSchools[i];return s?`<div class="cmp-slot filled">
    <div class="cmp-sn">École ${i+1}</div>
    <div class="cmp-name">${s.name}</div>
    <div class="cmp-city">${s.city}</div>
    <div class="cmp-price">${f(calcSchoolBudget(s).annual)}/an estimé</div>
    <div class="cmp-rm" onclick="removeCmp(${i})">Retirer ✕</div>
  </div>`:`<div class="cmp-slot"><div class="cmp-sn">École ${i+1}</div><div style="font-size:.8rem;color:var(--txt3)">Choisissez ci-dessous</div></div>`;}).join('')}
</div>
<div class="sect-lbl" style="margin-bottom:.6rem">Choisir une école à ajouter</div>
<div class="cmp-sel-area">
  ${_allSchools.map((s,i)=>`<button class="cmp-school-btn ${cmpSchools.some(c=>c.name===s.name&&c.type===s.type)?'added':''}" onclick="addCmp(${i})">
    ${s.name}<br><span style="font-size:.71rem;color:var(--txt3)">${s.city} · ${f(s.fees)}/an</span>
  </button>`).join('')}
</div>
${cmpSchools.length>=2?`<div style="overflow-x:auto;margin-top:1.25rem">
<table class="cmp-tbl"><thead><tr><th>Critère</th>${cmpSchools.map(s=>`<th>${s.name}</th>`).join('')}</tr></thead>
<tbody>${metrics.map(m=>{
  const vals=cmpSchools.map(s=>m.bfn?m.bfn(s):null);
  const best=m.best==='min'?Math.min(...vals):null;
  return`<tr><td>${m.l}</td>${cmpSchools.map((s,i)=>`<td class="${m.bfn&&vals[i]===best?'best-v':''}">${m.fn(s)}</td>`).join('')}</tr>`;}).join('')}
</tbody></table></div>`
:`<div class="ntc nb" style="margin-top:.875rem"><span class="ni">ℹ️</span>Sélectionnez au moins 2 écoles pour afficher la comparaison.</div>`}`;
}
function addCmp(i){if(cmpSchools.length>=3)return;const s=_allSchools[i];if(!cmpSchools.some(c=>c.name===s.name&&c.type===s.type))cmpSchools.push(s);renderCompare();}
function removeCmp(i){cmpSchools.splice(i,1);renderCompare();}

// ══════════════════════════════════════
// CLASSEMENT
// ══════════════════════════════════════
function renderRanking(){
  const all=allSchools();
  const filtered=rkFilter==='all'?all:all.filter(s=>s.type===rkFilter);
  const sorted=[...filtered].sort((a,b)=>calcSchoolBudget(a).annual-calcSchoolBudget(b).annual);
  document.getElementById('rkcontent').innerHTML=`
<div class="pt">🏆 Classement budget</div>
<div class="ps">57 écoles triées par budget annuel estimé (scolarité + studio + vie courante standard). Cliquez pour simuler.</div>
<div class="rf">
  ${[{v:'all',l:'Toutes (57)'},{v:'post-prepa',l:'Post-Prépa (22)'},{v:'post-bac',l:'Post-Bac (15)'},{v:'bachelor',l:'Bachelor (20)'}]
    .map(fi=>`<button class="rfb ${rkFilter===fi.v?'act':''}" onclick="rkFilter='${fi.v}';renderRanking()">${fi.l}</button>`).join('')}
</div>
${sorted.map((s,i)=>{const b=calcSchoolBudget(s);return`<div class="rk ${i<3?'top3':''}" onclick="startFromSchool('${s.type}','${s.name}')">
  <div class="rk-n">${i+1}</div>
  <div><div class="rk-nm">${s.name}${s.program?' · '+s.program:''}</div>
    <div class="rk-city">${s.city} · <span class="tag ${s.type==='post-prepa'?'tag-p':s.type==='bachelor'?'tag-a':'tag-g'}">${s.type==='post-prepa'?'PGE':s.type==='post-bac'?'Post-Bac':'Bachelor'}</span></div></div>
  <div class="rk-bud"><div class="rk-v">${f(b.annual)}/an</div><div class="rk-l">${f(s.fees)}/an scolarité</div></div>
</div>`;}).join('')}
<div class="ntc nb" style="margin-top:1rem"><span class="ni">ℹ️</span>Budget estimé = scolarité + studio + vie standard. Cliquez sur une école pour la simuler personnellement.</div>`;
}

// ══════════════════════════════════════
// FINDER
// ══════════════════════════════════════
function renderFinder(results){
  document.getElementById('fcontent').innerHTML=`
<div class="pt">🔍 Trouver dans mon budget</div>
<div class="ps">Entrez votre budget annuel maximum et découvrez les écoles accessibles.</div>
<div class="finder-h">
  <div class="finder-t">Quel est votre budget annuel maximum ?</div>
  <div class="finder-s">Scolarité + logement studio + vie courante standard</div>
  <div class="finder-row">
    <input type="number" class="finder-inp" id="finder-inp" value="${finderBudget}" min="5000" max="60000" step="500" placeholder="ex: 25000">
    <button class="finder-btn" onclick="runFinder()">Rechercher →</button>
  </div>
</div>
${results!==undefined?renderFinderResults(results):''}`;
}
function runFinder(){
  finderBudget=parseInt(document.getElementById('finder-inp').value)||25000;
  const all=allSchools();
  const res=all.filter(s=>calcSchoolBudget(s).annual<=finderBudget).sort((a,b)=>calcSchoolBudget(a).annual-calcSchoolBudget(b).annual);
  renderFinder(res);
}
function renderFinderResults(results){
  if(!results.length)return`<div class="finder-none">😕 Aucune école dans ce budget.<br><span style="font-size:.8rem;color:var(--txt3)">Essayez d'augmenter le montant.</span></div>`;
  return`<div style="margin-bottom:.875rem;font-size:.85rem;color:var(--txt2);font-weight:600">✅ <strong style="color:var(--gn)">${results.length} école${results.length>1?'s':''}</strong> dans votre budget de ${f(finderBudget)}/an</div>
<div class="finder-r-grid">${results.map(s=>{const b=calcSchoolBudget(s);return`<div class="finder-card" onclick="startFromSchool('${s.type}','${s.name}')">
  <div style="margin-bottom:.4rem"><span class="tag ${s.type==='post-prepa'?'tag-p':s.type==='bachelor'?'tag-a':'tag-g'}">${s.type==='post-prepa'?'PGE':s.type==='post-bac'?'Post-Bac':'Bachelor'}</span></div>
  <div class="fc-name">${s.name}${s.program?' · '+s.program:''}</div>
  <div class="fc-city">📍 ${s.city}</div>
  <div class="fc-bud">${f(b.annual)}/an</div>
  <div class="fc-fees">${f(s.fees)}/an scolarité · Simuler →</div>
</div>`;}).join('')}</div>`;
}

// ══════════════════════════════════════
// HANDLERS
// ══════════════════════════════════════
function setCursus(v){S.cursus=v;S.school=null;S.duration=v==='post-bac'?5:3;renderWizard()}
function setSchool(i){S.school=i===''?null:SCHOOLS[S.cursus][parseInt(i)];if(S.cursus==='bachelor'&&S.school)S.duration=S.school.duration;renderWizard()}
function setDur(d){S.duration=d;renderWizard()}
function setAlt(v){S.alternance=v;renderWizard()}
function setHousing(v){S.housing=v;if(v==='parents')S.apl=false;renderWizard()}
function toggleApl(){S.apl=!S.apl;renderWizard()}
function setFood(v){S.food=v;renderWizard()}
function setTr(v){S.transport=v;renderWizard()}
function setMonths(n){S.months=n;renderResults()}
function nxt(){if(S.step<6){S.step++;renderWizard();window.scrollTo({top:0,behavior:'smooth'});}}
function nxt2(){
  if(S.step===2){
    const sel=document.querySelector('.ssel');
    if(!S.school&&sel&&sel.value!=='')S.school=SCHOOLS[S.cursus][parseInt(sel.value)];
    if(!S.school)return;
  }
  nxt();
}
function prv(){if(S.step>1){S.step--;renderWizard();window.scrollTo({top:0,behavior:'smooth'});}}

function startWizard(){
  S={step:1,cursus:null,school:null,duration:3,alternance:false,housing:null,apl:false,food:250,transport:'tc',leisure:100,misc:50,months:10};
  renderWizard();
}
function startFromSchool(type,name){
  S={step:1,cursus:type,school:SCHOOLS[type].find(s=>s.name===name)||null,duration:3,alternance:false,housing:'studio',apl:false,food:250,transport:'tc',leisure:100,misc:50,months:10};
  if(S.school&&type==='bachelor')S.duration=S.school.duration;
  if(S.school)S.step=4;
  goTo('wizard');renderWizard();
}

// ══════════════════════════════════════
// INIT — HASH ROUTING
// ══════════════════════════════════════
(function init(){
  // 1. URL share params ?c=...
  if(loadFromURL()){
    renderResults();showResults();return;
  }
  // 2. Hash routing
  const hash=(window.location.hash||'#wizard').replace('#','');
  const validPages=['wizard','comparer','classement','finder'];
  const target=validPages.includes(hash)?hash:'wizard';
  if(target==='wizard'){startWizard();}
  goTo(target,false);
  // 3. Browser back/forward
  window.addEventListener('popstate',()=>{
    const h=(window.location.hash||'#wizard').replace('#','');
    if(validPages.includes(h)){
      if(h==='wizard')renderWizard();
      goTo(h,false);
    }
  });
})();
</script>
</body>
</html>
